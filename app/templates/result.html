{% extends "base.html" %}

{% block content %}

<style>

    *{
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;

        background: linear-gradient(rgba(15,23,42,0.85),
                    rgba(15,23,42,0.92)),
                    url("{{ url_for('static', filename='background/result_final.jpeg') }}");

        background-size: cover;
        background-position: center;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .auth-box {
        width: 420px;
        padding: 50px;
        border-radius: 25px;

        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);

        box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        text-align: center;
        transition: 0.4s ease;
    }

    .auth-box:hover {
        transform: translateY(-5px);
    }

    .auth-box h2 {
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: 600;

        background: linear-gradient(to right,#00f2fe,#a18cd1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .result-text {
        margin: 25px 0;
        font-size: 20px;
        font-weight: 600;
        padding: 15px;
        border-radius: 15px;

        background: rgba(0,242,254,0.15);
        box-shadow: 0 0 15px rgba(0,242,254,0.4);
    }

    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 25px;
    }

    .custom-btn {
        flex: 1;
        padding: 14px;
        border-radius: 30px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        text-align: center;

        background: linear-gradient(45deg,#00f2fe,#4facfe);
        color: #0f172a;

        transition: 0.3s ease;
    }

    .custom-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #00f2fe;
    }

</style>

<div class="auth-box">

    <h2>Prediction Result</h2>

    <div class="result-text">
        {{ result }}
    </div>

    <div class="btn-group">
        <a href="{{ url_for('main.index') }}" class="custom-btn">Home</a>
        <a href="{{ url_for('main.logout') }}" class="custom-btn">Logout</a>
    </div>

</div>

{% endblock %}
